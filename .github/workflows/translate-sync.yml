name: Translate Sync (RU → EN)

# see WP-415 Ф-В2 (translation pipeline automation, keystone-independent)
# Peer-session: sessions/2026-07/2026-07-01-12-wp415-translation-pipeline-automation/report.md
#
# NOTE (2026-07-07): a MimEcoSys mirror job lived here briefly (peer-session
# 2026-07-07-11) but was scoped to the wrong repo and reverted same day —
# this repo (personal, RU, 106 forks) already has its public RU home under
# TserenTserenov; it was never one of the aisystant repos slated for a
# MimEcoSys mirror (see WP-401's 11-repo privatization list). Don't re-add
# a МИМ job here without re-checking that scope question first.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "PRIVACY.md"
      - "LICENSE"
      - "CODEOWNERS"
      - "CITATION.cff"
      - "CHANGELOG.md"

concurrency:
  group: translate-sync-${{ github.ref }}
  cancel-in-progress: false

# Loop-guard: the bot only ever pushes to en-draft, which this workflow does
# not watch, so branch-scoping is the actual defense today. Kept as a second
# line of defense in case the trigger ever grows to include en-draft pushes —
# do not delete as "dead code" without checking the trigger above first.
jobs:
  sync:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.actor != 'canon-sync[bot]' &&
      !contains(github.event.head_commit.message, '[skip-translate]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      author_name: ${{ steps.source_author.outputs.name }}
      author_email: ${{ steps.source_author.outputs.email }}
    steps:
      - name: Checkout main (full history for delta diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run delivery tests (formal + content, unit-level)
        run: |
          pytest scripts/tests/test_delivery_formal.py \
                 scripts/tests/test_delivery_content.py \
                 scripts/tests/test_translate_delta.py -q

      - name: Fetch or create en-draft staging branch
        id: en_draft
        run: |
          if git ls-remote --exit-code --heads origin en-draft > /dev/null 2>&1; then
            git worktree add ../en-draft origin/en-draft
          else
            git worktree add -b en-draft ../en-draft
            git -C ../en-draft rm -rf --quiet . || true
          fi

      - name: Translate changed category-D files (delta)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +e
          # Writes straight into the en-draft worktree (already checked out
          # from origin/en-draft, holding every prior run's output) so files
          # untouched by this delta stay put. Do NOT stage this through a
          # throwaway ../en-out + `rsync --delete` mirror — that mirrors the
          # delta subset onto en-draft and deletes everything else, wiping
          # out all previously translated docs on every run that doesn't
          # touch all of them (caught 2026-07-06: a zero-file delta run
          # erased all 38 published files).
          python3 scripts/translate.py --mode=delta \
            --output-dir ../en-draft \
            --state-file ../en-draft/.translation-state.yaml
          rc=$?
          set -e
          # rc=2 is ASCII-guard warnings only: en-draft is a human-review
          # staging branch, so leftover Cyrillic stays visible in the log
          # and in delivery checks; the hard no-Cyrillic gate lives in the
          # publish-to-iwesys job below ("Cyrillic gate" step).
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then exit "$rc"; fi

      - name: Copy verbatim (non-translated) files to en-draft
        # LICENSE/CODEOWNERS/CITATION.cff are legal/machine-readable text —
        # publish as-is (WP-401 Ф5.2), never through the LLM translation path.
        # CHANGELOG.md added 2026-07-10: entries are terse commit-style lines,
        # already almost entirely English — verbatim avoids both an LLM-translation
        # policy call on Category G (still MVP manual_adapt) and the risk of
        # mistranslating a technical log, while fixing the Version badge on iwesys.
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          for f in LICENSE CODEOWNERS CITATION.cff; do
            if [ -f "$f" ]; then
              cp "$f" "../en-draft/$f"
            fi
          done
          # CHANGELOG.md is mixed-language (RU entry lines under EN version
          # headings), and the Cyrillic gate in publish-to-iwesys rejects any
          # Cyrillic — so publish an English-only projection instead of a
          # verbatim copy. Safe to filter: the Version badge only LINKS to
          # this file (static badge), nothing parses its content.
          python3 - <<'PYEOF'
          import re

          cyr = re.compile(r"[\u0400-\u04FF\u0500-\u052F]")
          lines = open("CHANGELOG.md", encoding="utf-8").read().splitlines()
          note = [
              "> English-only projection of the changelog: entries written",
              "> in Russian are omitted by the publishing pipeline.",
              "",
          ]
          kept = [line for line in lines if not cyr.search(line)]
          with open("../en-draft/CHANGELOG.md", "w", encoding="utf-8") as out:
              out.write("\n".join(note + kept) + "\n")
          PYEOF
          # Hero image for the README: published locally so the EN page
          # does not fetch assets from the RU repo (WP-401 Ф5, 2026-07-10).
          if [ -f "docs/assets/orz-cycle.svg" ]; then
            mkdir -p "../en-draft/docs/assets"
            cp "docs/assets/orz-cycle.svg" "../en-draft/docs/assets/orz-cycle.svg"
          fi

      - name: Strip RU-source references from the EN-side README
        # Pilot decision (WP-401 Ф5, 2026-07-10): the EN distribution must
        # not reference the Russian source at all — it is a self-contained
        # product page, not a projection banner. Lines are removed (not
        # rewritten) and keyed on URLs/paths so retranslation wording can't
        # break the match; every sed is idempotent.
        # ONTOLOGY.md is bilingual by design (RU term column + EN term
        # column) — translating it would destroy the RU→EN mapping and
        # trips the tier-1 glossary check (learned from failed run
        # 29099359739), so its mentions are dropped rather than published.
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          R="../en-draft/README.md"
          if [ -f "$R" ]; then
            # Language switcher (both historical targets).
            sed -i '\|\[English version\](https://github.com/iwesys/IWE)|d' "$R"
            sed -i '\|\[English version\](README.en.md)|d' "$R"
            # EN-sync badge points at the RU repo's en-draft branch.
            sed -i '\|en-draft/badge-data.json|d' "$R"
            # Hero image: served from the local copy (published verbatim
            # below), not from the RU repo's raw URL.
            sed -i 's|https://raw.githubusercontent.com/TserenTserenov/FMT-exocortex-template/main/docs/assets/orz-cycle.svg|docs/assets/orz-cycle.svg|' "$R"
            # Docs that exist only on the RU side: drop the referencing lines.
            sed -i '\|ONTOLOGY.md|d' "$R"
            sed -i '\|extensions/README.md|d' "$R"
            # Pack deep-links lead to Russian-language repos.
            sed -i '\|github.com/TserenTserenov/PACK-digital-platform|d' "$R"
            # Install command: EN readers fork the EN distribution.
            sed -i 's|gh repo fork TserenTserenov/FMT-exocortex-template|gh repo fork iwesys/IWE|' "$R"
            # Community links: feedback lives on the EN repo itself
            # (pilot decision 2026-07-10 — own Issues/Discussions).
            sed -i 's|https://github.com/TserenTserenov/FMT-exocortex-template/discussions|https://github.com/iwesys/IWE/discussions|' "$R"
            sed -i 's|https://github.com/TserenTserenov/FMT-exocortex-template/issues|https://github.com/iwesys/IWE/issues|' "$R"
          fi

      - name: Strip dead Cyrillic anchors from published markdown
        # Anchors slugified from Russian headings do not survive translation
        # (the EN heading produces a different slug), so a URL fragment with
        # Cyrillic is both a dead link and a Cyrillic-gate violation.
        # Dropping the fragment keeps the file link working on the EN side.
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          python3 - <<'PYEOF'
          import pathlib
          import re

          link = re.compile(
              r"(\]\([^)#\s]*)#[^)\s]*[\u0400-\u04FF\u0500-\u052F][^)\s]*(\))"
          )
          for path in pathlib.Path("../en-draft").rglob("*.md"):
              text = path.read_text(encoding="utf-8")
              cleaned = link.sub(r"\1\2", text)
              if cleaned != text:
                  path.write_text(cleaned, encoding="utf-8")
                  print(f"stripped Cyrillic anchors: {path}")
          PYEOF

      - name: Write EN-side community files to en-draft
        # Feedback lives on iwesys/IWE itself (pilot decision 2026-07-10):
        # Issues and Discussions are enabled on the EN repo, no references
        # to the working source. Direct pull requests still can't be merged
        # — the publish job overwrites the tree on every run — so the PR
        # template routes contributors to Issues. Generated fresh every run.
        # Closes the contributing/issue_template/pull_request_template gaps
        # in GitHub's community-profile check (WP-401 Ф5.4).
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          EN="https://github.com/iwesys/IWE"
          mkdir -p "../en-draft/.github/ISSUE_TEMPLATE"

          cat > "../en-draft/CONTRIBUTING.md" <<EOF
          # Contributing to IWE

          - **Report a bug or request a feature:** open an [issue]($EN/issues).
          - **Questions, ideas, show your setup:** start a [discussion]($EN/discussions).

          This distribution is assembled by an automated publishing pipeline,
          so direct pull requests can't be merged — every accepted change
          ships through the pipeline. If you want to change something, open
          an issue describing it and we'll take it from there.
          EOF

          cat > "../en-draft/.github/ISSUE_TEMPLATE/redirect.md" <<EOF
          ---
          name: Bug report or feature request
          about: Tell us what broke or what's missing
          title: ''
          labels: ''
          assignees: ''
          ---

          **What happened / what do you need?**

          **Steps to reproduce (for bugs):**

          **Environment:** OS, agent (Claude Code / other), template version
          (see the Version badge in the README).
          EOF

          cat > "../en-draft/.github/PULL_REQUEST_TEMPLATE.md" <<EOF
          This distribution is assembled by an automated publishing pipeline —
          direct pull requests can't be merged here. Please open an
          [issue]($EN/issues) describing the change instead.
          EOF

      # Tripwire (WP-483 Ф4): the vendored guide-kit/ copy must never reach the
      # EN distribution — the original already lives at iwesys/guide-kit, and a
      # second copy inside iwesys/IWE would be a diverging duplicate. Today this
      # is structurally impossible (paths-filter above + category-D manifest do
      # not cover guide-kit/), but both defenses are DATA that gets edited;
      # this check is the blocking backstop. A failure here fails the sync job,
      # so publish-to-iwesys (needs: sync) never runs on a polluted tree.
      # Honest limitation: the always()-guarded commit step below still pushes
      # the polluted tree to en-draft (staging), and every later run re-fails
      # here until en-draft is cleaned manually — accepted, because the hard
      # boundary being defended is the public iwesys/IWE distribution.
      - name: "Tripwire: guide-kit must never enter en-draft (WP-483)"
        run: test ! -e ../en-draft/guide-kit

      - name: Formal + content delivery checks (Tier-1 fail / Tier-2-3 warn)
        id: delivery_checks
        run: |
          set -e
          status=ok
          # Source of truth for which files to check is .translation-state.yaml
          # (written by translate.py --mode=delta), not a directory glob —
          # avoids re-deriving source paths by string-stripping ../en-draft/.
          files=$(python3 -c "
          import yaml
          with open('../en-draft/.translation-state.yaml', encoding='utf-8') as f:
              state = yaml.safe_load(f) or {}
          print('\n'.join(state.get('files_translated', [])))
          ")
          while IFS= read -r rel; do
            [ -z "$rel" ] && continue
            if ! python3 scripts/delivery_checks.py \
                --source "$rel" --output "../en-draft/$rel" \
                --glossary translation/glossary-v0.1.csv; then
              status=failed
            fi
          done <<< "$files"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "failed" ]; then exit 1; fi

      - name: Publish sync status badge data
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          color=green
          message=ok
          if [ "${{ steps.delivery_checks.outputs.status }}" = "failed" ]; then
            color=red
            message=failed
          fi
          cat > ../en-draft/badge-data.json <<EOF
          {"schemaVersion":1,"label":"EN sync","message":"$message","color":"$color"}
          EOF

      - name: Determine source commit author (WP-415, DP.SC.189)
        id: source_author
        if: always() && steps.en_draft.outcome == 'success'
        env:
          # head_commit is only the LAST commit of the push, not necessarily
          # the one that touched a translated path (docs/**, README.md) —
          # wrong on batch pushes and on ordinary (non-squash) merge commits,
          # where the merge commit is attributed to whoever clicked Merge,
          # not to the content's author (review finding, 2026-07-09). Scan
          # every commit in the push for one that actually changed a
          # translated path; env: keeps commit-message content out of the
          # shell parser (untrusted, could contain shell metacharacters).
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          FALLBACK_NAME: ${{ github.actor }}
          FALLBACK_EMAIL: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
        run: |
          # github.event.commits does not exist on workflow_dispatch runs —
          # toJSON() then yields the literal "null", which jq's `.[]` cannot
          # iterate (caught live 2026-07-09: run 29009566080 failed on this).
          # `(. // [])` treats a null input as an empty array instead.
          #
          # A single commit's added/modified/removed arrays can also be
          # absent from github.event.commits even on an ordinary direct
          # push (caught live 2026-07-10: run 29076945908, a 10-file push,
          # had none of the three keys on its one commit) — `.added` is then
          # `null`, and `null | any(...)` errors the same way ("Cannot
          # iterate over null") because `any` iterates its input. `(.x // [])`
          # per field defaults each to an empty array before concatenating.
          MATCH=$(echo "$COMMITS_JSON" | jq -c \
            '(. // []) | [.[] | select(((.added // []) + (.modified // []) + (.removed // [])) | any(test("^(README\\.md$|docs/)")))] | last // empty')
          if [ -n "$MATCH" ] && [ "$MATCH" != "null" ]; then
            echo "name=$(echo "$MATCH" | jq -r '.author.name')" >> "$GITHUB_OUTPUT"
            echo "email=$(echo "$MATCH" | jq -r '.author.email')" >> "$GITHUB_OUTPUT"
          else
            echo "name=$FALLBACK_NAME" >> "$GITHUB_OUTPUT"
            echo "email=$FALLBACK_EMAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to en-draft
        if: always() && steps.en_draft.outcome == 'success'
        env:
          # Committer stays canon-sync[bot] (the entity that operates this
          # pipeline); author becomes the human who made the source change
          # (previous step), so public commits show real attribution instead
          # of a generic bot (IT-meeting feedback, 2026-07-09).
          AUTHOR_NAME: ${{ steps.source_author.outputs.name }}
          AUTHOR_EMAIL: ${{ steps.source_author.outputs.email }}
        run: |
          cd ../en-draft
          # Committer = canon-sync (the pipeline), author = source-repo human.
          # GitHub renders "Authored by X, committed by canon-sync[bot]" —
          # the standard cherry-pick/backport-bot pattern, not an anonymous commit.
          git config user.name "canon-sync[bot]"
          git config user.email "canon-sync[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi
          git commit --author="${AUTHOR_NAME} <${AUTHOR_EMAIL}>" \
            -m "chore(translate-sync): sync EN draft from $(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD) [skip-translate]"
          # HEAD:en-draft also covers the detached worktree that
          # `git worktree add ../en-draft origin/en-draft` produces when
          # the branch already exists on the remote
          git push origin HEAD:en-draft

  # Publishes the en-draft branch (already gated by sync's delivery_checks
  # above — this job only runs if sync succeeded) as the default branch of
  # the public EN repo in iwesys. Target repo name and creation are a
  # one-time manual bootstrap step (WP-415); until it exists this job warns
  # and no-ops rather than failing every push.
  publish-to-iwesys:
    needs: sync
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: iwesys/IWE
    steps:
      - name: Generate iwesys installation token
        id: iwesys_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CANON_SYNC_APP_ID }}
          private-key: ${{ secrets.CANON_SYNC_APP_KEY }}
          owner: iwesys

      - name: Checkout en-draft
        uses: actions/checkout@v6
        with:
          ref: en-draft
          fetch-depth: 0
          # actions/checkout persists its default GITHUB_TOKEN as a git
          # credential for https://github.com/ by default — that overrides
          # the app-token credentials embedded in the `iwesys` remote URL
          # below (same host, different repo), so the push authenticates
          # as github-actions[bot] instead of the app and gets a 403.
          persist-credentials: false

      - name: "Cyrillic gate: block any Cyrillic from reaching iwesys"
        # Hard boundary (WP-415 Phase V): the public EN distribution must
        # contain no Cyrillic at all — file contents, file names, or commit
        # author identity. en-draft (staging) may hold translation leftovers
        # for human review; this gate is what keeps them out of iwesys.
        # No bypass flag on purpose: fix the content (en-draft or source),
        # then re-run the workflow.
        env:
          AUTHOR_NAME: ${{ needs.sync.outputs.author_name }}
          AUTHOR_EMAIL: ${{ needs.sync.outputs.author_email }}
        run: |
          python3 - <<'PYEOF'
          import os
          import re
          import subprocess
          import sys

          cyr = re.compile(r"[\u0400-\u04FF\u0500-\u052F]")
          offences = []

          for var in ("AUTHOR_NAME", "AUTHOR_EMAIL"):
              value = os.environ.get(var, "")
              if cyr.search(value):
                  offences.append(f"commit {var.lower()}: {value!r}")

          listing = subprocess.run(
              ["git", "ls-files", "-z"], capture_output=True, check=True
          )
          for path in filter(None, listing.stdout.decode("utf-8").split("\0")):
              if cyr.search(path):
                  offences.append(f"{path}: Cyrillic in file name")
              try:
                  with open(path, encoding="utf-8") as handle:
                      text = handle.read()
              except (UnicodeDecodeError, OSError):
                  continue  # binary or unreadable: file name checked above
              hits = [
                  (number, line)
                  for number, line in enumerate(text.splitlines(), 1)
                  if cyr.search(line)
              ]
              if hits:
                  number, line = hits[0]
                  offences.append(
                      f"{path}: {len(hits)} line(s) with Cyrillic,"
                      f" first at {number}: {line.strip()[:100]}"
                  )

          if offences:
              for offence in offences:
                  print(f"::error::Cyrillic gate: {offence}")
              sys.exit(1)
          print("Cyrillic gate: tree is clean.")
          PYEOF

      - name: Check target repo exists
        id: target_check
        env:
          GH_TOKEN: ${{ steps.iwesys_token.outputs.token }}
        run: |
          if gh repo view "$TARGET_REPO" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::$TARGET_REPO ещё не создан (bootstrap-чеклист WP-415) — публикация в iwesys пропущена."
          fi

      - name: Commit current tree onto iwesys history (single commit per run)
        if: steps.target_check.outputs.exists == 'true'
        env:
          GIT_AUTHOR_NAME: ${{ needs.sync.outputs.author_name }}
          GIT_AUTHOR_EMAIL: ${{ needs.sync.outputs.author_email }}
          GIT_COMMITTER_NAME: "canon-sync[bot]"
          GIT_COMMITTER_EMAIL: "canon-sync[bot]@users.noreply.github.com"
        run: |
          git remote add iwesys "https://x-access-token:${{ steps.iwesys_token.outputs.token }}@github.com/$TARGET_REPO.git"
          # en-draft carries THIS repo's own full commit history (currently
          # 1000+ commits, largely Russian) — force-pushing that ref wholesale
          # would silently re-introduce that history into iwesys on every run,
          # undoing any cleanup done there (caught live 2026-07-09: a manual
          # history reset on iwesys was wiped out by the very next sync run).
          # Fix: take only the CURRENT TREE from en-draft and commit it on top
          # of iwesys's own existing history — iwesys keeps its own clean,
          # append-only history, one attributed commit per publish, and never
          # inherits en-draft's past commits.
          TREE=$(git rev-parse HEAD^{tree})
          if git ls-remote --exit-code --heads iwesys main > /dev/null 2>&1; then
            git fetch iwesys main
            PARENT=$(git rev-parse FETCH_HEAD)
            if [ "$(git rev-parse "$PARENT^{tree}")" = "$TREE" ]; then
              echo "No content change since last publish to iwesys, skipping."
              exit 0
            fi
            NEW_COMMIT=$(git commit-tree "$TREE" -p "$PARENT" \
              -m "chore(translate-sync): sync EN draft from $(git rev-parse --short HEAD)")
          else
            NEW_COMMIT=$(git commit-tree "$TREE" \
              -m "chore(translate-sync): sync EN draft from $(git rev-parse --short HEAD)")
          fi
          git push iwesys "$NEW_COMMIT:refs/heads/main"
